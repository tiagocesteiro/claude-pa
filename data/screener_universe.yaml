# ATLAS Stock Screener — Universe
#
# Finnhub free tier covers US-listed tickers (incl. ADRs of foreign companies).
# Native EU listings (RHM.DE etc.) return empty — so we use ADRs to get
# European/Indian/LatAm exposure through tickers that actually return data.
#
# Two buckets, reflecting Tiago's HYBRID brief (70% complement / 30% reinforce):
#   complement — sectors/geographies he does NOT already hold (full weight)
#   reinforce  — his favourite themes, but players he doesn't own (handicapped)
#
# Already held (EXCLUDED from universe — no point recommending what he owns):
#   NVDA, MSTR (Strategy), COIN, META, MSFT, AMZN, SOUN (SoundHound), BE (Bloom)
#
# Edit freely. Add a ticker under the right bucket+theme. Keep it US-listed/ADR.

