name: ATLAS Daily Briefing

# Runs at 6am Lisbon year-round (handles DST):
#   - 05:00 UTC → 6am WEST (summer, Mar–Oct)
#   - 06:00 UTC → 6am WET  (winter, Oct–Mar)
# The script gates on Europe/Lisbon hour so only one fires per day.
on:
  schedule:
    - cron: "0 5 * * *"   # 6am Lisbon summer
    - cron: "0 6 * * *"   # 6am Lisbon winter
  workflow_dispatch:       # manual trigger from GitHub UI

jobs:
  briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node (for Claude Code CLI)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml "edgartools[ai]"

      - name: Gate on Lisbon 6am (DST-aware)
        id: gate
        run: |
          python - <<'PY'
          import os
          from datetime import datetime
          from zoneinfo import ZoneInfo
          lisbon = datetime.now(ZoneInfo("Europe/Lisbon"))
          should_run = lisbon.hour == 6
          print(f"Lisbon time: {lisbon.isoformat()}")
          print(f"Should run: {should_run}")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"should_run={'true' if should_run else 'false'}\n")
          PY

      - name: Run ATLAS briefing
        if: steps.gate.outputs.should_run == 'true' || github.event_name == 'workflow_dispatch'
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          SEC_IDENTITY: ${{ secrets.SEC_IDENTITY }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python scripts/atlas_briefing.py
