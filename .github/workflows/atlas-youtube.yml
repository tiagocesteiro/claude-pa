name: ATLAS YouTube Monitor

# Polls YouTube channels in data/youtube_channels.yaml every hour.
# When a new video is detected: fetch transcript → ATLAS analysis → Discord.
# State (last-seen video IDs) is persisted in data/youtube_state.json, committed back to repo.

on:
  schedule:
    - cron: "30 * * * *"   # hourly at :30
  workflow_dispatch:        # manual trigger

permissions:
  contents: write           # required to commit youtube_state.json back

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node (for Claude Code CLI)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml youtube-transcript-api yt-dlp

      - name: Run YouTube monitor
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python scripts/atlas_youtube.py

      - name: Commit state if changed
        run: |
          if git diff --quiet data/youtube_state.json; then
            echo "No state change."
          else
            git config user.name "atlas-bot"
            git config user.email "atlas-bot@users.noreply.github.com"
            git add data/youtube_state.json
            git commit -m "chore(atlas-youtube): update seen video IDs"
            git push
          fi
