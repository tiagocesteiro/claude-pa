name: ATLAS YouTube Monitor

# Polls YouTube channels every 30 min. Also runs the daily briefing (06-10h Lisboa)
# since GitHub's daily cron scheduler is unreliable — piggybacking on this working cron.

on:
  schedule:
    - cron: "30 * * * *"   # every hour at :30
  workflow_dispatch:        # manual trigger

permissions:
  contents: write           # required to commit state files back

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 25     # briefing (~6min) + youtube analysis (~8min) = up to 14min

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node (for Claude Code CLI)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml youtube-transcript-api yt-dlp

      - name: Run YouTube monitor (+ morning briefing if applicable)
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          SEC_IDENTITY: ${{ secrets.SEC_IDENTITY }}
        run: python scripts/atlas_youtube.py

      - name: Commit state if changed
        run: |
          git config user.name "atlas-bot"
          git config user.email "atlas-bot@users.noreply.github.com"
          git add data/youtube_state.json data/briefing_state.json
          if git diff --cached --quiet; then
            echo "No state change."
          else
            git commit -m "chore(atlas): update state"
            git push
          fi
